<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Shield Flash Utility</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
</head>
<body>
    <main class="container" style="max-width: 600px; margin-top: 50px;">
        <article>
            <header>
                <h2>⚡ AI Shield Flash Utility</h2>
                <p>Deploy the Sub-GHz interference classifier directly to your Heltec V4.</p>
            </header>
            
            <p><strong>Requirements:</strong></p>
            <ul>
                <li>Google Chrome or Microsoft Edge browser.</li>
                <li>Heltec WiFi LoRa 32 V4 connected via USB-C.</li>
            </ul>

            <div style="margin: 30px 0; text-align: center;">
                <script type="module" src="https://unpkg.com/esp-web-tools@9.4.2/dist/web/install-button.js?module"></script>
                <esp-web-install-button manifest="manifest.json"></esp-web-install-button>
            </div>

            <footer>
                <small>Status: PoC Ready. Make sure to select the correct COM port when prompted.</small>
            </footer>
        </article>
    </main>
</body>
</html>
